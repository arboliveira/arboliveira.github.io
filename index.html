<!DOCTYPE html>

<html lang="en" 
	  xmlns="http://www.w3.org/1999/xhtml" xml:lang="en"
	  xmlns:customary="https://customaryjs.github.io/schema"
	  xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
	  xsi:schemaLocation="https://customaryjs.github.io/schema https://customaryjs.github.io/customary.xsd"
>

<!-- -->

<head>

	<title>a r b o</title>

	<style>
		/* 
           --mobile-breakpoint: 768px
           --foldable-breakpoint: 832px
            
           Note: CSS variables cannot be used in @media conditions.      
           Search each number to find all uses of its breakpoint.
        */

		@media (max-width: 768px) {  /* --mobile-breakpoint */
			.page-layout {
				--within-mobile-breakpoint: true;
			}
		}
		@media (max-width: 832px) {  /* --foldable-breakpoint */
			.page-layout {
				--within-foldable-breakpoint: true;
			}
		}
	</style>
	
	<style>
		@property --angle-extra {
			syntax: '<angle>';
			inherits: true;
			initial-value: 0deg;  /* use to animate the orbit */
		}
		body {
			min-height: 98vh;
		}
	</style>

	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<link rel="icon" href="./favicon.svg" />
</head>

<!-- -->

<body>

<template data-customary-name="doorway-to-infinite" data-customary-attributes="href">
	<div>
		<a target="_blank" href="{{href}}">
		<p class="doorway">{{title}}</p>
			<slot></slot>
		</a>
	</div>
	<style>
		div {
			text-align: center;
			width: 6em;
			aspect-ratio: 1;
			/*border: solid;*/
		}
		div:hover {
			cursor: pointer;
		}
		a {
			color: black;
			text-decoration: none;
		}
		.doorway {
			font-family: monospace, Courier New;
			font-weight: bold;
			font-size: 0.8em;
		}
	</style>
</template>

<template data-customary-name="the-arbo-group-logo">
<div id="logo-circle" class="wheel-of-fortune"
	 style="display: flex; flex-direction: column; align-items: center; justify-content: center"
>
	<div id="logo-rectangle" style="display: flex; flex-direction: column; gap: 2em">
        <div style="display: flex; justify-content: space-around;" class="the-arbo-group-text">
            <span>T</span><span>H</span><span>E</span>
        </div>
        <div class="arbo-logo-grid">
            <div class="the-arbo-group-border arbo-logo-a">
                <span class="the-arbo-group-logo">a</span>
            </div>
            <div class="the-arbo-group-border arbo-logo-r">
                <span class="the-arbo-group-logo">r</span>
            </div>
            <div class="the-arbo-group-border arbo-logo-b">
                <span class="the-arbo-group-logo">b</span>
            </div>
            <div class="the-arbo-group-border arbo-logo-o">
                <span class="the-arbo-group-logo">o</span>
            </div>
        </div>
		<div style="display: flex; justify-content: space-around;" class="the-arbo-group-text">
			<span>N</span><span>E</span><span>X</span><span>U</span><span>S</span>
		</div>
	</div>
</div>
	<customary:classMap
			target=".wheel-of-fortune" classInfo="{{wheel_classes}}"
	></customary:classMap>

	<style>
		#logo-circle {
			height: 360px;
			aspect-ratio: 1;
			padding: 5em; /* circle around the text */
			border-radius: 50%; border-width: 2px; border-style: dotted; border-color: silver;
		}
		#logo-rectangle {
			width: 340px;
		}
		@media (max-width: 768px) {  /* --mobile-breakpoint */
			#logo-circle {
				min-height: 40vh;
				padding: 4em;
			}
		}
		#logo-circle:hover {
			background-color: mintcream;
			cursor: pointer;
		}
		.the-arbo-group-text {
			font-family: "Courier New", monospace;
			font-size: 1.2em;
			font-weight: bold;
			text-align: center;
		}
		.the-arbo-group-logo {
			font-family: "Times New Roman", serif;
			font-size: 6em;
			text-decoration: underline;
		}
		.the-arbo-group-border {
			border: 1px solid silver;
			padding: 4px;
			text-align: center;
		}
		.arbo-logo-grid {
			display: grid;
			grid-template-columns: auto 0.6em auto 0.6em auto 0.6em auto;
			grid-template-rows: repeat(4, auto) 1.2em;
		}
		.arbo-logo-a {
			grid-column: 1;
			grid-row: 1 / span 3;
		}
		.arbo-logo-r {
			grid-column: 3;
			grid-row: 2 / span 3;
		}
		.arbo-logo-b {
			grid-column: 5;
			grid-row: 3 / span 3;
		}
		.arbo-logo-o {
			grid-column: 7;
			grid-row: 4;
		}
		.wheel-of-fortune {
			animation-name: wheel-of-fortune;
			animation-duration: 4s;
			animation-iteration-count: infinite;
			animation-timing-function: linear;
			animation-play-state: paused;
		}
		.wheel-of-fortune-spinning {
			animation-play-state: running;
		}
		@keyframes wheel-of-fortune {
			to {rotate: 360deg}
		}
	</style>
</template>

<!-- -->

<template data-customary-name="galaxy-nexus">
	<div id="page">

		<the-arbo-group-logo></the-arbo-group-logo>
		<customary:classMap target="div#page" classInfo="{{page_classes}}"></customary:classMap>

		<doorway-to-infinite class="orbit" style="--i: 1" title="Personal" href="https://github.com/arboliveira/">
			<img alt="GitHub icon" class="small-img" src="./GitHub_Invertocat_Black.png"/>
		</doorway-to-infinite>

		<doorway-to-infinite class="orbit" style="--i: 2" title="Professional" href="https://www.linkedin.com/in/arboliveira">
			<img alt="LinkedIn icon" class="small-img" src="./linkedin.png"/>
		</doorway-to-infinite>

		<doorway-to-infinite class="orbit" style="--i: 5" title="Random" href="https://arbo.nexus/onepageland/">
			<img alt="One Page Land icon" class="small-img" src="./one-page-land.svg"/>
		</doorway-to-infinite>

		<doorway-to-infinite class="orbit" style="--i: 3" title="Open" href="https://customary.js.org/">
			<img alt="Customary icon" class="small-img" src="./Customary.png"/>
		</doorway-to-infinite>

		<doorway-to-infinite class="orbit" style="--i: 4" title="Fun" href="https://arbo.nexus/steamside/">
			<img alt="Steamside icon" class="small-img" src="./steamside.png"/>
		</doorway-to-infinite>

	</div>
	<style>
		div#page {
			position: relative;
			min-height: calc(100vh - var(--orbit-distance) + 3vw);
			display: flex;
			justify-content: center;
			align-items: center;
			--satellite-slot-count: 5;
			--orbit-distance: 4vw;
			--orbit-r: calc(min(33vh, 33vw) + var(--orbit-distance));
			animation: orbit-spin 20s linear infinite reverse;
			animation-play-state: paused;
		}
		@media (max-width: 832px) {  /* --foldable-breakpoint */
			div#page {
				--orbit-distance: 8vw;
			}
		}
		@media (max-width: 768px) {  /* --mobile-breakpoint */
			div#page {
				zoom: 52%;
				--orbit-distance: 50vw;
				margin-top: 50vh;
			}
		}
		.page-orbiting {
			animation-play-state: running !important;
		}
		@keyframes orbit-spin {
			to { --angle-extra: 360deg; }
		}
		.small-img {
			max-height: 3em;
		}
		.orbit {
			position: absolute;
			top: 50%;
			left: 50%;
			--angle: calc(-135deg + var(--angle-extra) + var(--i) * (360deg / var(--satellite-slot-count)));
			transform:
				translate(-50%, -50%)
				rotate(var(--angle))
				translateY(calc(-1 * var(--orbit-r)))
				rotate(calc(-1 * var(--angle)));
		}
	</style>
</template>

<div style="display: flex; height: 98vh">
<galaxy-nexus style="flex: 2"></galaxy-nexus>
</div>

<!-- -->

<script type="importmap">{"imports": {
	"#customary": "./_dependencies/customary/customary.mjs"
}}</script>
<script type="module">
	/**
	 * @type {CustomaryDeclaration}
	 */
	globalThis['customary:galaxy-nexus'] = {
		config: {
			state: ['orbiting'],
		},
		hooks: {
			derive: {
				'page_classes': el => ({'page-orbiting': el['orbiting']})
			},
			events: {
				'': el => el['orbiting'] = !el['orbiting']
			}
		}
	};
	globalThis['customary:the-arbo-group-logo'] = {
		config: {
			state: ['spinning'],
		},
		hooks: {
			derive: {
				'wheel_classes': el => ({'wheel-of-fortune-spinning': el['spinning']})
			},
			events: {
				'#logo-circle': el => el['spinning'] = !el['spinning']
			}
		}
	};
</script>
<script type="module">import '#customary';</script>

<!-- -->

</body>

</html>
