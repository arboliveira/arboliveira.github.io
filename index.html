<!DOCTYPE html>

<html lang="en" 
	  xmlns="http://www.w3.org/1999/xhtml" xml:lang="en"
	  xmlns:customary="https://customaryjs.github.io/schema"
	  xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
	  xsi:schemaLocation="https://customaryjs.github.io/schema https://customaryjs.github.io/customary.xsd"
>

<!-- -->

<head>

	<title> a r b o</title>

	<style>
		@property --angle-extra {
			syntax: '<angle>';
			inherits: true;
			initial-value: 0deg;  /* use to animate the orbit */
		}
	</style>

</head>

<!-- -->

<body>

<template data-customary-name="doorway-to-infinite" data-customary-attributes="href">
	<div>
		<a target="_blank" href="{{href}}">
		<p class="doorway">{{title}}</p>
			<slot></slot>
		</a>
	</div>
	<style>
		div {
			text-align: center;
		}
		div:hover {
			cursor: pointer;
		}
		a {
			color: black;
			text-decoration: none;
		}
		.doorway {
			font-family: monospace, Courier New;
			font-weight: bold;
			font-size: 0.8em;
		}
	</style>
</template>

<template data-customary-name="the-arbo-group-logo">
	<table id="logo-circle" class="wheel-of-fortune">
		<tr>
			<td colspan=7>
				<table border="0" width="100%"><tr>
					<td class="the-arbo-group-text">T</td>
					<td class="the-arbo-group-text">H</td>
					<td class="the-arbo-group-text">E</td>
				</tr></table>
			</td>
		</tr>
		<tr>
			<td rowspan=3 class="the-arbo-group-border">
				<span class="the-arbo-group-logo">a</span>
			</td>
			<td>&nbsp;</td>
		</tr>
		<tr>
			<td>&nbsp;</td>
			<td valign=top rowspan=3 class="the-arbo-group-border">
				<span class="the-arbo-group-logo">r</span>
			</td>
		</tr>
		<tr>
			<td>&nbsp;</td>
			<td>&nbsp;</td>
			<td valign=top rowspan=3 class="the-arbo-group-border">
				<span class="the-arbo-group-logo">b</span>
			</td>
		</tr>
		<tr>
			<td>&nbsp;</td>
			<td>&nbsp;</td>
			<td>&nbsp;</td>
			<td>&nbsp;</td>
			<td class="the-arbo-group-border">
				<span class="the-arbo-group-logo">o</span>
			</td>
		</tr>
		<tr>
			<td>&nbsp;</td>
		</tr>
		<tr>
			<td colspan=7>
				<table border="0" width="100%"><tr>
					<td class="the-arbo-group-text">N</td>
					<td class="the-arbo-group-text">E</td>
					<td class="the-arbo-group-text">X</td>
					<td class="the-arbo-group-text">U</td>
					<td class="the-arbo-group-text">S</td>
				</tr></table>
			</td>
		</tr>
	</table>
	<customary:classMap
			target=".wheel-of-fortune" classInfo="{{wheel_classes}}"
	></customary:classMap>

	<style>
		#logo-circle {
			--side: min(66vh, 66vw);
			min-height: var(--side);
			min-width: var(--side);

			/* circle around the text */
			border-radius: 50%; border-width: 2px; border-style: dotted; border-color: silver;

			/* keep text inside circle */
			padding-left: 80pt; padding-right: 80pt; padding-top: 50pt; padding-bottom: 50pt;
		}
		#logo-circle:hover {
			background-color: mintcream;
			cursor: pointer;
		}
		.the-arbo-group-text {
			font-family: "Courier New", monospace;
			font-size: 16pt;
			font-weight: bold;
			text-align: center;
		}
		.the-arbo-group-logo {
			font-family: "Times New Roman", serif;
			font-size: 64pt;
			text-decoration: underline;
		}
		.the-arbo-group-border {
			border: 1px solid silver;
			padding: 4px;
			text-align: center;
		}
		.wheel-of-fortune {
			animation-name: wheel-of-fortune;
			animation-duration: 4s;
			animation-iteration-count: infinite;
			animation-timing-function: linear;
			animation-play-state: paused;
		}
		.wheel-of-fortune-spinning {
			animation-play-state: running;
		}
		@keyframes wheel-of-fortune {
			to {rotate: 360deg}
		}
	</style>
</template>

<!-- -->

<template data-customary-name="galaxy-nexus">
	<div id="page">

		<the-arbo-group-logo></the-arbo-group-logo>
		<customary:classMap target="div#page" classInfo="{{page_classes}}"></customary:classMap>

		<doorway-to-infinite class="orbit" style="--i: 1" title="Personal" href="https://github.com/arboliveira/">
			<img class="small-img" src="GitHub-Mark.png"/>
		</doorway-to-infinite>

		<doorway-to-infinite class="orbit" style="--i: 4" title="Open" href="https://customaryjs.github.io/">
			<div class="small-img" style="font-size: xx-large">&#x1F475;</div>
		</doorway-to-infinite>

		<doorway-to-infinite class="orbit" style="--i: 2" title="Professional" href="https://www.linkedin.com/in/arboliveira">
			<img class="small-img" src="linkedin.png"/>
		</doorway-to-infinite>

		<doorway-to-infinite class="orbit" style="--i: 3" title="Fun" href="http://arboliveira.github.io/steamside/">
			<img class="small-img" src="steamside.png"/>
		</doorway-to-infinite>

	</div>
	<style>
		div#page {
			position: relative;
			min-height: calc(100vh - var(--orbit-distance) + 3vw);
			display: flex;
			justify-content: center;
			align-items: center;
			--total: 4;
			--orbit-distance: 5vw;
			--orbit-r: calc(min(33vh, 33vw) + var(--orbit-distance));
			margin-top: calc(var(--orbit-distance) - 4vw);
			animation: orbit-spin 20s linear infinite reverse;
			animation-play-state: paused;
		}
		.page-orbiting {
			animation-play-state: running !important;
		}
		@keyframes orbit-spin {
			to { --angle-extra: 360deg; }
		}
		.small-img {
			height: 40px;
		}
		.orbit {
			position: absolute;
			top: 50%;
			left: 50%;
			--angle: calc(-135deg + var(--angle-extra) + var(--i) * (360deg / var(--total)));
			transform:
				translate(-50%, -50%)
				rotate(var(--angle))
				translateY(calc(-1 * var(--orbit-r)))
				rotate(calc(-1 * var(--angle)));
		}
	</style>
</template>

<galaxy-nexus></galaxy-nexus>

<!-- -->

<script type="importmap">{"imports": {
	"#customary": "./_dependencies/customary/customary.mjs"
}}</script>
<script type="module">
	/**
	 * @type {CustomaryDeclaration}
	 */
	globalThis['customary:galaxy-nexus'] = {
		config: {
			state: ['orbiting'],
		},
		hooks: {
			derive: {
				'page_classes': el => ({'page-orbiting': el['orbiting']})
			},
			events: {
				'': el => el['orbiting'] = !el['orbiting']
			}
		}
	};
	globalThis['customary:the-arbo-group-logo'] = {
		config: {
			state: ['spinning'],
		},
		hooks: {
			derive: {
				'wheel_classes': el => ({'wheel-of-fortune-spinning': el['spinning']})
			},
			events: {
				'#logo-circle': el => el['spinning'] = !el['spinning']
			}
		}
	};
</script>
<script type="module">import '#customary';</script>

<!-- -->

</body>

</html>
